<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>解析メニュー</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: #1f2937;
      background: #f8fafc;
    }
    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
    }
    .lead {
      margin: 0 0 28px;
      color: #4b5563;
      font-size: 15px;
      line-height: 1.7;
    }
    .top-actions {
      display: flex;
      justify-content: flex-end;
      margin: -12px 0 18px;
    }
    .source-download {
      border: 1px solid #2563eb;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      padding: 8px 12px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    .source-download:hover,
    .source-download:focus-visible {
      background: #1d4ed8;
      border-color: #1d4ed8;
      outline: none;
    }
    .source-download:disabled {
      border-color: #cbd5e1;
      background: #e2e8f0;
      color: #64748b;
      cursor: not-allowed;
    }
    .analysis-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }
    .analysis-link {
      display: block;
      min-height: 136px;
      padding: 18px;
      border: 1px solid #d6dde8;
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: #fff;
      transition: border-color 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
    }
    .analysis-link:hover,
    .analysis-link:focus-visible {
      border-color: #2563eb;
      box-shadow: 0 10px 28px rgba(37, 99, 235, 0.12);
      outline: none;
      transform: translateY(-1px);
    }
    .analysis-title {
      display: block;
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: 700;
    }
    .analysis-description {
      display: block;
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>解析メニュー</h1>
    <p class="lead">確認したい解析を選択してください。</p>
    <div class="top-actions">
      <button class="source-download" type="button" id="exportSources">元データDL</button>
    </div>
    <nav class="analysis-list" aria-label="解析メニュー">
      <a class="analysis-link" href="./deck-transition.html">
        <span class="analysis-title">デッキ使用率推移</span>
        <span class="analysis-description">デッキを選択して、期間ごとの使用率推移を確認します。</span>
      </a>
      <a class="analysis-link" href="./field-transition.html">
        <span class="analysis-title">環境内の使用率推移</span>
        <span class="analysis-description">環境全体での使用率推移を確認する解析ページです。</span>
      </a>
    </nav>
  </main>
  <script>
    const SOURCE_FILES = [
      { name: 'usage_matrix_nd.csv', path: './usage_matrix_nd.csv' },
      { name: 'usage_matrix_ad.csv', path: './usage_matrix_ad.csv' },
      { name: 'events.json', path: './events.json' },
    ];

    function downloadFile(filename, content, type) {
      const blob = content instanceof Blob ? content : new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function createZip(files) {
      const encoder = new TextEncoder();
      const localParts = [];
      const centralParts = [];
      let offset = 0;

      files.forEach(file => {
        const nameBytes = encoder.encode(file.name);
        const contentBytes = encoder.encode(file.content);
        const crc = crc32(contentBytes);
        const localHeader = makeZipHeader(0x04034b50, nameBytes, contentBytes.length, crc);
        const centralHeader = makeZipHeader(0x02014b50, nameBytes, contentBytes.length, crc, offset);

        localParts.push(localHeader, contentBytes);
        centralParts.push(centralHeader);
        offset += localHeader.length + contentBytes.length;
      });

      const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
      const end = makeZipEnd(files.length, centralSize, offset);
      return new Blob([...localParts, ...centralParts, end], { type: 'application/zip' });
    }

    function makeZipHeader(signature, nameBytes, size, crc, offset = 0) {
      const isCentral = signature === 0x02014b50;
      const buffer = new ArrayBuffer(isCentral ? 46 + nameBytes.length : 30 + nameBytes.length);
      const view = new DataView(buffer);
      let p = 0;

      view.setUint32(p, signature, true); p += 4;
      if (isCentral) { view.setUint16(p, 20, true); p += 2; }
      view.setUint16(p, 20, true); p += 2;
      view.setUint16(p, 0x0800, true); p += 2;
      view.setUint16(p, 0, true); p += 2;
      view.setUint16(p, 0, true); p += 2;
      view.setUint16(p, 0, true); p += 2;
      view.setUint32(p, crc, true); p += 4;
      view.setUint32(p, size, true); p += 4;
      view.setUint32(p, size, true); p += 4;
      view.setUint16(p, nameBytes.length, true); p += 2;
      view.setUint16(p, 0, true); p += 2;

      if (isCentral) {
        view.setUint16(p, 0, true); p += 2;
        view.setUint16(p, 0, true); p += 2;
        view.setUint16(p, 0, true); p += 2;
        view.setUint32(p, 0, true); p += 4;
        view.setUint32(p, offset, true); p += 4;
      }

      new Uint8Array(buffer).set(nameBytes, p);
      return new Uint8Array(buffer);
    }

    function makeZipEnd(fileCount, centralSize, centralOffset) {
      const buffer = new ArrayBuffer(22);
      const view = new DataView(buffer);
      view.setUint32(0, 0x06054b50, true);
      view.setUint16(8, fileCount, true);
      view.setUint16(10, fileCount, true);
      view.setUint32(12, centralSize, true);
      view.setUint32(16, centralOffset, true);
      return new Uint8Array(buffer);
    }

    function crc32(bytes) {
      let crc = 0xffffffff;
      bytes.forEach(byte => {
        crc ^= byte;
        for (let i = 0; i < 8; i++) {
          crc = (crc >>> 1) ^ (0xedb88320 & -(crc & 1));
        }
      });
      return (crc ^ 0xffffffff) >>> 0;
    }

    async function exportSourcesZip() {
      const button = document.getElementById('exportSources');
      button.disabled = true;
      try {
        const files = await Promise.all(SOURCE_FILES.map(async source => ({
          name: source.name,
          content: await fetch(source.path).then(response => response.text()),
        })));
        downloadFile('deck_usage_source_data.zip', createZip(files), 'application/zip');
      } finally {
        button.disabled = false;
      }
    }

    document.getElementById('exportSources')?.addEventListener('click', exportSourcesZip);
  </script>
</body>
</html>
