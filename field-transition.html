<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>環境内の使用率推移</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: #1f2937;
      background: #f8fafc;
    }
    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }
    h1 {
      margin: 22px 0 10px;
      font-size: clamp(26px, 5vw, 38px);
      line-height: 1.15;
    }
    p {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <a href="./index.html">解析メニューへ戻る</a>
    <h1>環境内の使用率推移</h1>
    <p>この解析は準備中です。</p>
  </main>
</body>
</html>
